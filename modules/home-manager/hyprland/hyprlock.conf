$font = Monospace
$bg = rgb(000000)
$fg = rgb(e0e0e0)
$dim = rgb(4b4b4b)

general {
    hide_cursor = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    color = $bg
}

input-field {
    monitor =
    size = 360, 72
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = $fg
    check_color = $fg
    fail_color = $fg

    font_color = $fg
    font_size = 24
    fade_on_empty = false
    rounding = 0

    font_family = $font
    placeholder_text = [ password ]
    fail_text = [ password ]

    dots_text_format = *
    dots_size = 0.35
    dots_spacing = 0.25

    hide_input = false

    position = 0, -90
    halign = center
    valign = center
}

# Terminal-style frame: decorative ASCII only, no host/user/status data.
label {
    monitor =
    text = +------------------------------+
    font_size = 24
    font_family = $font
    color = $dim

    position = 0, 110
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 24
    font_family = $font
    color = $fg

    position = 0, 35
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%a %Y-%m-%d" # update every 60 seconds
    font_size = 24
    font_family = $font
    color = $fg

    position = 0, -35
    halign = center
    valign = center
}

label {
    monitor =
    text = +------------------------------+
    font_size = 24
    font_family = $font
    color = $dim

    position = 0, -145
    halign = center
    valign = center
}
